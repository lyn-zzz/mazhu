<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f8fbf8" />
    <title>码住 - 安装</title>
    <link rel="icon" href="./assets/app-icon.png" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7fbf8;
        --text: #10221c;
        --muted: #60716a;
        --faint: #7a8982;
        --primary: #0f7c70;
        --primary-dark: #0b2c25;
        --border: #d8e5de;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 12% 4%, rgba(184, 246, 232, 0.62), transparent 28rem),
          linear-gradient(180deg, #fbfdfb 0%, var(--bg) 100%);
        color: var(--text);
        font-family:
          "PingFang SC",
          "Hiragino Sans GB",
          "Microsoft YaHei",
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .shell {
        width: min(320px, calc(100% - 40px));
        border: 1px solid var(--border);
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.88);
        padding: 30px 24px;
        box-shadow: 0 28px 80px rgba(17, 52, 43, 0.12);
      }

      .logo {
        width: 64px;
        margin-bottom: 34px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.78rem, 7.4vw, 2.28rem);
        line-height: 1.08;
        letter-spacing: -0.04em;
        overflow-wrap: anywhere;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        font-weight: 600;
        line-height: 1.75;
      }

      .button {
        display: inline-flex;
        min-height: 52px;
        align-items: center;
        justify-content: center;
        margin-top: 28px;
        border-radius: 999px;
        background: var(--primary-dark);
        color: #fff;
        padding: 0 24px;
        font-weight: 850;
        text-decoration: none;
      }

      .hint {
        display: none;
      }

      .wechat .hint {
        display: block;
      }

      .wechat .auto,
      .unsupported .auto {
        display: none;
      }

      .arrow {
        position: fixed;
        top: 10px;
        right: 18px;
        color: var(--primary);
        font-size: 3.2rem;
        line-height: 1;
      }

      .steps {
        margin-top: 22px;
        border-radius: 22px;
        background: #edf6f1;
        padding: 16px 18px;
      }

      .steps p {
        color: var(--text);
        font-size: 0.96rem;
      }

      .status {
        margin-top: 18px;
        color: var(--faint);
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main id="shell" class="shell">
      <img class="logo" src="./assets/mazhu-logo.png" alt="码住" />
      <section class="auto" aria-live="polite">
        <h1>正在准备安装</h1>
        <p>即将开始下载码住 Android 安装包。</p>
        <a id="manualDownload" class="button" href="https://github.com/lyn-zzz/mazhu/releases/latest">手动下载安装包</a>
        <p id="status" class="status">如果没有自动开始，请点击上方按钮。</p>
      </section>
      <section class="hint">
        <div class="arrow" aria-hidden="true">↗</div>
        <h1>请在浏览器打开</h1>
        <p>微信或 QQ 内置浏览器可能会拦截 APK 下载。</p>
        <div class="steps">
          <p>点击右上角 ···，选择“在浏览器打开”，然后继续安装。</p>
        </div>
      </section>
    </main>

    <script>
      const ua = navigator.userAgent.toLowerCase();
      const shell = document.getElementById("shell");
      const manualDownload = document.getElementById("manualDownload");
      const statusText = document.getElementById("status");
      const isAndroid = ua.includes("android");
      const isBlockedBrowser = ua.includes("micromessenger") || ua.includes(" qq/") || ua.includes("mqqbrowser");

      if (isBlockedBrowser) {
        shell.classList.add("wechat");
      } else if (!isAndroid) {
        shell.classList.add("unsupported");
        shell.innerHTML = `
          <img class="logo" src="./assets/mazhu-logo.png" alt="码住" />
          <h1>请使用 Android 手机安装</h1>
          <p>码住目前仅支持 Android 系统。</p>
          <a class="button" href="./">返回首页</a>
        `;
      } else {
        fetch("./latest.json", { cache: "no-store" })
          .then((response) => response.json())
          .then((latest) => {
            if (!latest.apkUrl) throw new Error("missing apkUrl");
            manualDownload.href = latest.apkUrl;
            window.setTimeout(() => {
              window.location.href = latest.apkUrl;
            }, 450);
          })
          .catch(() => {
            statusText.textContent = "暂时无法读取最新版本，请稍后重试。";
          });
      }
    </script>
  </body>
</html>
