name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  apk:
    name: Build signed APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Node dependencies
        run: npm ci

      - name: Check release secrets
        run: |
          test -n "${{ secrets.MAZHU_SUPABASE_URL }}" || (echo "Missing MAZHU_SUPABASE_URL" && exit 1)
          test -n "${{ secrets.MAZHU_SUPABASE_PUBLISHABLE_KEY }}" || (echo "Missing MAZHU_SUPABASE_PUBLISHABLE_KEY" && exit 1)
          test -n "${{ secrets.MAZHU_RELEASE_KEYSTORE_BASE64 }}" || (echo "Missing MAZHU_RELEASE_KEYSTORE_BASE64" && exit 1)
          test -n "${{ secrets.MAZHU_RELEASE_KEYSTORE_PASSWORD }}" || (echo "Missing MAZHU_RELEASE_KEYSTORE_PASSWORD" && exit 1)
          test -n "${{ secrets.MAZHU_RELEASE_KEY_ALIAS }}" || (echo "Missing MAZHU_RELEASE_KEY_ALIAS" && exit 1)
          test -n "${{ secrets.MAZHU_RELEASE_KEY_PASSWORD }}" || (echo "Missing MAZHU_RELEASE_KEY_PASSWORD" && exit 1)

      - name: Decode release keystore
        run: |
          echo "${{ secrets.MAZHU_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/release-keystore.jks

      - name: Run unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest

      - name: Build release APK
        working-directory: android
        env:
          SUPABASE_URL: ${{ secrets.MAZHU_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.MAZHU_SUPABASE_PUBLISHABLE_KEY }}
          MAZHU_RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/android/release-keystore.jks
          MAZHU_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.MAZHU_RELEASE_KEYSTORE_PASSWORD }}
          MAZHU_RELEASE_KEY_ALIAS: ${{ secrets.MAZHU_RELEASE_KEY_ALIAS }}
          MAZHU_RELEASE_KEY_PASSWORD: ${{ secrets.MAZHU_RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Prepare artifact
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-manual}"
          APK_PATH="$(find android/app/build/outputs/apk/release -maxdepth 1 -name 'app-release*.apk' ! -name '*unsigned*' | head -n 1)"
          test -n "$APK_PATH" || (echo "No signed release APK found" && exit 1)
          APK_NAME="mazhu-${VERSION}.apk"
          cp "$APK_PATH" "dist/${APK_NAME}"
          echo "SITE_TAG_NAME=${VERSION}" >> "$GITHUB_ENV"
          echo "SITE_RELEASE_DATE=$(date -u +%F)" >> "$GITHUB_ENV"
          echo "SITE_APK_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/${APK_NAME}" >> "$GITHUB_ENV"
          echo "SITE_APK_SHA256=$(shasum -a 256 "dist/${APK_NAME}" | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mazhu-apk
          path: dist/*.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true

      - name: Build GitHub Pages site
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run build:site

      - name: Configure GitHub Pages
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/deploy-pages@v4
